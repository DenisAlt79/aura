<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

  <!-- DEFINICIONES -->
  <defs>

    <!-- Fondo -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Agua -->
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- FONDO -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- TITULO -->
  <text x="800"
        y="60"
        fill="#ffffff"
        font-size="40"
        text-anchor="middle"
        font-family="Arial"
        font-weight="bold">
    SISTEMA INDUSTRIAL DE BOMBEO
  </text>

  <!-- SUBTITULO -->
  <text x="800"
        y="100"
        fill="#94a3b8"
        font-size="22"
        text-anchor="middle"
        font-family="Arial">
    SCADA Industrial - Pozo CDB
  </text>

  <!-- TANQUE IZQUIERDO -->
  <g>

    <rect x="100"
          y="220"
          width="260"
          height="430"
          rx="18"
          fill="#1e293b"
          stroke="#64748b"
          stroke-width="6"/>

    <!-- AGUA -->
    <rect x="118"
          y="430"
          width="224"
          height="202"
          fill="url(#water)"/>

    <!-- BRILLO -->
    <rect x="130"
          y="445"
          width="18"
          height="170"
          fill="#7dd3fc"
          opacity="0.35"/>

    <!-- TEXTO -->
    <text x="230"
          y="710"
          fill="#ffffff"
          font-size="28"
          text-anchor="middle"
          font-family="Arial"
          font-weight="bold">
      POZO
    </text>

  </g>

  <!-- TUBERIA ENTRADA -->
  <line x1="360"
        y1="520"
        x2="560"
        y2="520"
        stroke="#475569"
        stroke-width="26"
        stroke-linecap="round"/>

  <!-- FLUJO -->
  <g>

    <circle cx="380"
            cy="520"
            r="11"
            fill="#38bdf8"
            filter="url(#glow)">

      <animateMotion dur="2s"
                     repeatCount="indefinite"
                     path="M0 0 L160 0"/>

    </circle>

    <circle cx="380"
            cy="520"
            r="11"
            fill="#7dd3fc"
            opacity="0.8">

      <animateMotion dur="2s"
                     begin="1s"
                     repeatCount="indefinite"
                     path="M0 0 L160 0"/>

    </circle>

  </g>

  <!-- BOMBA -->
  <g>

    <!-- CUERPO -->
    <circle cx="680"
            cy="520"
            r="100"
            fill="#334155"
            stroke="#22c55e"
            stroke-width="8"/>

    <!-- ARO -->
    <circle cx="680"
            cy="520"
            r="70"
            fill="none"
            stroke="#22c55e"
            stroke-width="4"
            opacity="0.6"/>

    <!-- ASPAS -->
    <g transform="translate(680 520)">

      <g>

        <animateTransform attributeName="transform"
                           type="rotate"
                           from="0"
                           to="360"
                           dur="3s"
                           repeatCount="indefinite"/>

        <ellipse cx="0" cy="-42"
                 rx="15"
                 ry="48"
                 fill="#22c55e"/>

        <ellipse cx="42" cy="0"
                 rx="48"
                 ry="15"
                 fill="#22c55e"/>

        <ellipse cx="0" cy="42"
                 rx="15"
                 ry="48"
                 fill="#22c55e"/>

        <ellipse cx="-42" cy="0"
                 rx="48"
                 ry="15"
                 fill="#22c55e"/>

      </g>

    </g>

    <!-- CENTRO -->
    <circle cx="680"
            cy="520"
            r="26"
            fill="#14532d"/>

    <!-- LED -->
    <circle cx="760"
            cy="450"
            r="14"
            fill="#22c55e">

      <animate attributeName="opacity"
               values="1;0.3;1"
               dur="1s"
               repeatCount="indefinite"/>

    </circle>

    <!-- TEXTO -->
    <text x="680"
          y="675"
          fill="#22c55e"
          font-size="34"
          text-anchor="middle"
          font-family="Arial"
          font-weight="bold">
      BOMBA ACTIVA
    </text>

  </g>

  <!-- TUBERIA SALIDA -->
  <line x1="780"
        y1="520"
        x2="1080"
        y2="520"
        stroke="#475569"
        stroke-width="26"
        stroke-linecap="round"/>

  <!-- FLUJO SALIDA -->
  <g>

    <circle cx="800"
            cy="520"
            r="11"
            fill="#38bdf8"
            filter="url(#glow)">

      <animateMotion dur="2s"
                     repeatCount="indefinite"
                     path="M0 0 L260 0"/>

    </circle>

    <circle cx="800"
            cy="520"
            r="11"
            fill="#7dd3fc"
            opacity="0.8">

      <animateMotion dur="2s"
                     begin="1s"
                     repeatCount="indefinite"
                     path="M0 0 L260 0"/>

    </circle>

  </g>

  <!-- TANQUE DERECHO -->
  <g>

    <rect x="1080"
          y="240"
          width="320"
          height="420"
          rx="18"
          fill="#1e293b"
          stroke="#64748b"
          stroke-width="6"/>

    <!-- AGUA -->
    <rect x="1100"
          y="410"
          width="280"
          height="230"
          fill="url(#water)"/>

    <!-- REFLEJO -->
    <rect x="1115"
          y="430"
          width="20"
          height="180"
          fill="#7dd3fc"
          opacity="0.35"/>

    <!-- TEXTO -->
    <text x="1240"
          y="720"
          fill="#ffffff"
          font-size="30"
          text-anchor="middle"
          font-family="Arial"
          font-weight="bold">
      TANQUE PRINCIPAL
    </text>

  </g>

  <!-- ENERGIA -->
  <g>

    <line x1="680"
          y1="300"
          x2="680"
          y2="410"
          stroke="#22c55e"
          stroke-width="10"/>

    <circle cx="680"
            cy="270"
            r="24"
            fill="#22c55e"
            filter="url(#glow)">

      <animate attributeName="opacity"
               values="1;0.2;1"
               dur="1s"
               repeatCount="indefinite"/>

    </circle>

  </g>

  <!-- BASE -->
  <rect x="0"
        y="820"
        width="1600"
        height="80"
        fill="#111827"/>

  <!-- ESPACIOS METRICAS -->
  <g>

    <rect x="260"
          y="835"
          width="260"
          height="40"
          rx="10"
          fill="#0f172a"
          stroke="#22c55e"
          stroke-width="3"/>

    <rect x="670"
          y="835"
          width="260"
          height="40"
          rx="10"
          fill="#0f172a"
          stroke="#38bdf8"
          stroke-width="3"/>

    <rect x="1080"
          y="835"
          width="260"
          height="40"
          rx="10"
          fill="#0f172a"
          stroke="#f59e0b"
          stroke-width="3"/>

  </g>

  <!-- LABELS -->
  <text x="390"
        y="825"
        fill="#94a3b8"
        font-size="22"
        text-anchor="middle"
        font-family="Arial">
    CAUDAL
  </text>

  <text x="800"
        y="825"
        fill="#94a3b8"
        font-size="22"
        text-anchor="middle"
        font-family="Arial">
    ACUMULADO
  </text>

  <text x="1210"
        y="825"
        fill="#94a3b8"
        font-size="22"
        text-anchor="middle"
        font-family="Arial">
    VOLTAJE DC
  </text>

  <!-- LEDS -->
  <circle cx="1470"
          cy="110"
          r="15"
          fill="#22c55e">

    <animate attributeName="opacity"
             values="1;0.3;1"
             dur="1s"
             repeatCount="indefinite"/>

  </circle>

  <circle cx="1520"
          cy="110"
          r="15"
          fill="#eab308">

    <animate attributeName="opacity"
             values="1;0.3;1"
             dur="1.5s"
             repeatCount="indefinite"/>

  </circle>

  <circle cx="1570"
          cy="110"
          r="15"
          fill="#ef4444">

    <animate attributeName="opacity"
             values="1;0.3;1"
             dur="2s"
             repeatCount="indefinite"/>

  </circle>

  <!-- FOOTER -->
  <text x="800"
        y="890"
        fill="#64748b"
        font-size="20"
        text-anchor="middle"
        font-family="Arial">
    Grafana Canvas SCADA - Sistema Industrial de Bombeo
  </text>

</svg>
