<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

  <!-- DEFINICIONES -->
  <defs>

    <!-- Gradiente cielo -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Gradiente panel solar -->
    <linearGradient id="solar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- FONDO -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- SOL -->
  <circle cx="1300" cy="140" r="70"
          fill="#facc15"
          filter="url(#glow)">

    <animate attributeName="r"
             values="68;74;68"
             dur="4s"
             repeatCount="indefinite"/>

  </circle>

  <!-- RAYOS -->
  <g stroke="#fde047" stroke-width="4">

    <line x1="1300" y1="20" x2="1300" y2="70"/>
    <line x1="1300" y1="210" x2="1300" y2="260"/>
    <line x1="1180" y1="140" x2="1230" y2="140"/>
    <line x1="1370" y1="140" x2="1420" y2="140"/>

    <line x1="1210" y1="50" x2="1245" y2="85"/>
    <line x1="1355" y1="195" x2="1390" y2="230"/>

    <line x1="1390" y1="50" x2="1355" y2="85"/>
    <line x1="1245" y1="195" x2="1210" y2="230"/>

  </g>

  <!-- TITULO -->
  <text x="800"
        y="60"
        fill="#ffffff"
        font-size="38"
        text-anchor="middle"
        font-family="Arial"
        font-weight="bold">
    INDUSTRIAL SOLAR ENERGY SCADA
  </text>

  <!-- TERRENO -->
  <rect x="0" y="760" width="1600" height="140" fill="#14532d"/>

  <!-- PANELES SOLARES -->
  <g transform="translate(140,260)">

    <!-- FILA 1 -->
    <g>

      <!-- Panel -->
      <polygon points="0,0 220,0 180,120 -40,120"
               fill="url(#solar)"
               stroke="#93c5fd"
               stroke-width="3"/>

      <!-- Líneas internas -->
      <g stroke="#bfdbfe" stroke-width="1">
        <line x1="40" y1="0" x2="0" y2="120"/>
        <line x1="80" y1="0" x2="40" y2="120"/>
        <line x1="120" y1="0" x2="80" y2="120"/>
        <line x1="160" y1="0" x2="120" y2="120"/>
        <line x1="200" y1="0" x2="160" y2="120"/>

        <line x1="-20" y1="30" x2="200" y2="30"/>
        <line x1="-30" y1="60" x2="190" y2="60"/>
        <line x1="-35" y1="90" x2="185" y2="90"/>
      </g>

    </g>

    <!-- Panel 2 -->
    <g transform="translate(260,0)">
      <polygon points="0,0 220,0 180,120 -40,120"
               fill="url(#solar)"
               stroke="#93c5fd"
               stroke-width="3"/>

      <g stroke="#bfdbfe" stroke-width="1">
        <line x1="40" y1="0" x2="0" y2="120"/>
        <line x1="80" y1="0" x2="40" y2="120"/>
        <line x1="120" y1="0" x2="80" y2="120"/>
        <line x1="160" y1="0" x2="120" y2="120"/>
        <line x1="200" y1="0" x2="160" y2="120"/>

        <line x1="-20" y1="30" x2="200" y2="30"/>
        <line x1="-30" y1="60" x2="190" y2="60"/>
        <line x1="-35" y1="90" x2="185" y2="90"/>
      </g>
    </g>

  </g>

  <!-- FLUJO ENERGIA -->
  <line x1="520" y1="420"
        x2="760" y2="420"
        stroke="#22c55e"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Partículas energía -->
  <circle cx="520" cy="420" r="8" fill="#4ade80">

    <animateMotion dur="2s"
                   repeatCount="indefinite"
                   path="M0 0 L240 0"/>

  </circle>

  <circle cx="520" cy="420" r="8" fill="#86efac">

    <animateMotion dur="2s"
                   begin="1s"
                   repeatCount="indefinite"
                   path="M0 0 L240 0"/>

  </circle>

  <!-- INVERSOR -->
  <rect x="760"
        y="330"
        width="180"
        height="180"
        rx="18"
        fill="#1e293b"
        stroke="#22c55e"
        stroke-width="5"/>

  <text x="850"
        y="390"
        fill="#ffffff"
        font-size="28"
        text-anchor="middle"
        font-family="Arial"
        font-weight="bold">
    INVERTER
  </text>

  <!-- Indicador -->
  <circle cx="850" cy="450"
          r="18"
          fill="#22c55e">

    <animate attributeName="opacity"
             values="1;0.3;1"
             dur="1s"
             repeatCount="indefinite"/>

  </circle>

  <!-- CONEXION A BATERIAS -->
  <line x1="940"
        y1="420"
        x2="1150"
        y2="420"
        stroke="#38bdf8"
        stroke-width="10"/>

  <!-- BATERIAS -->
  <g transform="translate(1150,300)">

    <rect width="220"
          height="260"
          rx="12"
          fill="#1e293b"
          stroke="#38bdf8"
          stroke-width="5"/>

    <text x="110"
          y="50"
          fill="#ffffff"
          font-size="28"
          text-anchor="middle"
          font-family="Arial"
          font-weight="bold">
      BATTERY BANK
    </text>

    <!-- Nivel bateria -->
    <rect x="55"
          y="90"
          width="110"
          height="140"
          rx="8"
          fill="#0f172a"
          stroke="#64748b"
          stroke-width="3"/>

    <rect x="65"
          y="110"
          width="90"
          height="100"
          fill="#22c55e">

      <animate attributeName="height"
               values="100;90;100"
               dur="3s"
               repeatCount="indefinite"/>

      <animate attributeName="y"
               values="110;120;110"
               dur="3s"
               repeatCount="indefinite"/>

    </rect>

    <text x="110"
          y="255"
          fill="#22c55e"
          font-size="30"
          text-anchor="middle"
          font-family="Arial"
          font-weight="bold">
      92%
    </text>

  </g>

  <!-- TORRE ELECTRICA -->
  <g transform="translate(850,520)">

    <line x1="0" y1="0" x2="-40" y2="180"
          stroke="#94a3b8"
          stroke-width="6"/>

    <line x1="0" y1="0" x2="40" y2="180"
          stroke="#94a3b8"
          stroke-width="6"/>

    <line x1="-40" y1="180" x2="40" y2="180"
          stroke="#94a3b8"
          stroke-width="6"/>

    <line x1="-60" y1="50" x2="60" y2="50"
          stroke="#94a3b8"
          stroke-width="5"/>

    <line x1="-50" y1="100" x2="50" y2="100"
          stroke="#94a3b8"
          stroke-width="5"/>

    <!-- Energia -->
    <circle cx="-50" cy="50" r="6" fill="#facc15">

      <animateMotion dur="2s"
                     repeatCount="indefinite"
                     path="M0 0 L100 0"/>

    </circle>

  </g>

  <!-- INDICADORES -->
  <g transform="translate(90,620)">

    <!-- Caja -->
    <rect width="420"
          height="110"
          rx="12"
          fill="#1e293b"
          stroke="#64748b"
          stroke-width="4"/>

    <text x="30" y="40"
          fill="#ffffff"
          font-size="24"
          font-family="Arial">
      Solar Generation:
    </text>

    <text x="290" y="40"
          fill="#22c55e"
          font-size="24"
          font-family="Arial"
          font-weight="bold">
      124 kW
    </text>

    <text x="30" y="80"
          fill="#ffffff"
          font-size="24"
          font-family="Arial">
      Grid Status:
    </text>

    <text x="260" y="80"
          fill="#22c55e"
          font-size="24"
          font-family="Arial"
          font-weight="bold">
      ONLINE
    </text>

  </g>

  <!-- LEDs -->
  <circle cx="1460" cy="720"
          r="16"
          fill="#22c55e">

    <animate attributeName="opacity"
             values="1;0.2;1"
             dur="1s"
             repeatCount="indefinite"/>

  </circle>

  <circle cx="1510" cy="720"
          r="16"
          fill="#eab308">

    <animate attributeName="opacity"
             values="1;0.2;1"
             dur="1.5s"
             repeatCount="indefinite"/>

  </circle>

  <circle cx="1560" cy="720"
          r="16"
          fill="#ef4444">

    <animate attributeName="opacity"
             values="1;0.2;1"
             dur="2s"
             repeatCount="indefinite"/>

  </circle>

  <!-- FOOTER -->
  <text x="800"
        y="860"
        fill="#94a3b8"
        font-size="20"
        text-anchor="middle"
        font-family="Arial">
    Industrial Solar Energy Monitoring - Grafana Canvas SCADA
  </text>

</svg>
