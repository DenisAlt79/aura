<svg width="280" height="500" viewBox="0 0 280 500" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

  </defs>

  <!-- Tanque -->
  <rect x="20"
        y="20"
        width="240"
        height="420"
        rx="18"
        fill="#1e293b"
        stroke="#64748b"
        stroke-width="6"/>

  <!-- Agua -->
  <rect x="38"
        y="220"
        width="204"
        height="202"
        fill="url(#water)">

    <animate attributeName="height"
             values="202;180;202"
             dur="4s"
             repeatCount="indefinite"/>

    <animate attributeName="y"
             values="220;242;220"
             dur="4s"
             repeatCount="indefinite"/>

  </rect>

  <!-- Reflejo -->
  <rect x="52"
        y="240"
        width="18"
        height="160"
        fill="#7dd3fc"
        opacity="0.35"/>

  <!-- Etiqueta -->
  <text x="140"
        y="480"
        fill="#ffffff"
        font-size="28"
        text-anchor="middle"
        font-family="Arial"
        font-weight="bold">
    TANQUE
  </text>

</svg>
